<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerald | Network Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{
  background:#0b1220;
  color:#e5e7eb;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.card{
  background:#111827;
  width:100%;
  max-width:900px;
  border-radius:20px;
  padding:40px;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  border:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
}

.left{
  display:flex;
  align-items:center;
  gap:25px;
}

.profile-circle{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#1f2937;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  color:#38bdf8;
  font-weight:700;
}

.info h1{
  font-size:26px;
  margin-bottom:6px;
}

.role{
  font-size:14px;
  color:#38bdf8;
  margin-bottom:10px;
}

.description{
  font-size:14px;
  color:#9ca3af;
  max-width:400px;
}

.right{
  text-align:right;
}

.buttons a{
  display:block;
  margin:8px 0;
  padding:10px 20px;
  border-radius:8px;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  background:#38bdf8;
  color:#0b1220;
  transition:0.3s;
}

.buttons a:hover{
  background:#0ea5e9;
}

.socials{
  margin-top:15px;
}

.socials a{
  color:#9ca3af;
  margin-left:15px;
  font-size:18px;
}

.socials a:hover{
  color:#38bdf8;
}

@media(max-width:768px){
  .card{
    flex-direction:column;
    text-align:center;
  }
  .left{
    flex-direction:column;
  }
  .right{
    text-align:center;
    margin-top:20px;
  }
  .description{
    max-width:100%;
  }
}

</style>
</head>
<body>

<div class="card">

  <div class="left">
    <div class="profile-circle">GI</div>
    <div class="info">
      <h1>Gerald Ibrani</h1>
      <div class="role">Network Engineer & Linux System Administrator</div>
      <div class="description">
        Specialized in routing architecture, Linux server deployment, ISP field operations, and secure network infrastructure design.
      </div>
    </div>
  </div>

  <div class="right">
    <div class="buttons">
      <a href="about.html">About</a>
      <a href="skills.html">Skills</a>
      <a href="experience.html">Experience</a>
      <a href="contact.html">Contact</a>
    </div>

    <div class="socials">
      <a href="mailto:geraldibrani@geraldstudio.my.id"><i class="fa-solid fa-envelope"></i></a>
      <a href="https://github.com/heralt-vernandes" target="_blank"><i class="fa-brands fa-github"></i></a>
    </div>
  </div>

</div>

</body>
</html>
